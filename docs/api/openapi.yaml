openapi: 3.0.0
info:
  title: Octraban Indexer API
  version: "1.0.0"
  description: >-
    Route inventory for the indexer service (default PORT 3001). Every path
    and HTTP method below is generated from the Express route registrations
    in indexer/src/api.js, indexer/src/routes/admin.js, and
    indexer/src/billing/stripeWebhook.js by indexer/scripts/openapi-drift.js.
    `node indexer/scripts/openapi-drift.js --check` runs in CI and fails the
    build if this file and the implemented routes disagree. See
    docs/OPENAPI.md for how to regenerate it.

    This file intentionally documents route *existence* (path + method), not
    full request/response schemas — response bodies below are sketched
    generically and path parameters aren't declared. Maintainers may
    hand-enrich any entry (add real request/response schemas, mark an
    endpoint experimental or mock-data-returning with `x-status: experimental`
    or `x-status: mock`) without breaking the drift check, as long as the
    path and method keys stay present — the generator only ever adds missing
    entries and never rewrites or removes existing ones.
servers:
  - url: http://localhost:3001
    description: Local indexer (default PORT)
