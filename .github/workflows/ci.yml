name: Build & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate no duplicate keys in package.json
        run: |
          node -e "
            const fs = require('fs');
            const src = fs.readFileSync('package.json', 'utf8');
            // Check each of the dependency sections for duplicate keys
            const sections = ['dependencies', 'devDependencies', 'optionalDependencies', 'peerDependencies'];
            let failed = false;
            for (const section of sections) {
              const m = src.match(new RegExp('\"' + section + '\"\\\\s*:\\\\s*\\\\{([^}]+)\\\\}', 's'));
              if (!m) continue;
              const seen = new Set();
              m[1].replace(/\"([^\"]+)\"\s*:/g, (_, k) => {
                if (seen.has(k)) { console.error('Duplicate key in ' + section + ':', k); failed = true; }
                seen.add(k);
              });
            }
            if (failed) process.exit(1);
            console.log('No duplicate dependency keys found.');
          "

      # Pre-existing step — unchanged from original CI
      - name: TypeScript build (src/)
        run: npm run build

      # New step: type-check scripts/ with @types/node available
      # Uses tsconfig.scripts.json (extends root tsconfig + adds types:node)
      - name: Type-check scripts/
        run: npm run typecheck:scripts

      # New step: scan src/ for phantom Prisma field references
      # Uses ts-node --transpile-only (same pattern as audit-indexes + validate-routes)
      # Exits 1 only if a field name that doesn't exist in schema.prisma is found
      - name: Prisma field reference validator
        run: npm run validate:prisma
