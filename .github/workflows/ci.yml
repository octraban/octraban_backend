name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & Type-check ────────────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check (src)
        run: npm run build -- --noEmit

      - name: Type-check (scripts)
        run: npm run typecheck:scripts

  # ── Build & Validate ─────────────────────────────────────────────────────────
  build:
    name: Build (Node ${{ matrix.node-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate no duplicate keys in package.json
        run: |
          node -e "
            const fs = require('fs');
            const src = fs.readFileSync('package.json', 'utf8');
            const sections = ['dependencies', 'devDependencies', 'optionalDependencies', 'peerDependencies'];
            let failed = false;
            for (const section of sections) {
              const m = src.match(new RegExp('\"' + section + '\"\\\\s*:\\\\s*\\\\{([^}]+)\\\\}', 's'));
              if (!m) continue;
              const seen = new Set();
              m[1].replace(/\"([^\"]+)\"\s*:/g, (_, k) => {
                if (seen.has(k)) { console.error('Duplicate key in ' + section + ':', k); failed = true; }
                seen.add(k);
              });
            }
            if (failed) process.exit(1);
            console.log('No duplicate dependency keys found.');
          "

      - name: TypeScript build
        run: npm run build

      - name: Prisma field reference validator
        run: npm run validate:prisma

  # ── Security Scanning ─────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high || true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Autobuild for CodeQL
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript

  # ── Tests ─────────────────────────────────────────────────────────────────────
  test:
    name: Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          STELLAR_NETWORK: testnet

  # ── Docker Build & Push ───────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [lint, build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Staging Deployment ────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying ghcr.io/${{ github.repository }}:sha-${{ github.sha }} to staging"
          # Replace with actual deploy command, e.g.:
          # ssh ${{ secrets.STAGING_HOST }} "docker pull ghcr.io/${{ github.repository }}:sha-${{ github.sha }} && docker-compose up -d"
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - name: Health check staging
        run: |
          echo "Waiting for staging to become healthy..."
          sleep 10
          # curl -f ${{ vars.STAGING_URL }}/health || exit 1

  # ── Production Deployment ─────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint, build, security]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}:stable
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to production
        run: |
          echo "Deploying ${{ steps.tag.outputs.tag }} to production"
          # ssh ${{ secrets.PROD_HOST }} "docker pull ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag }} && docker-compose up -d"
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - name: Health check production
        run: |
          echo "Waiting for production to become healthy..."
          sleep 15
          # curl -f ${{ vars.PRODUCTION_URL }}/health || exit 1

  # ── Rollback ──────────────────────────────────────────────────────────────────
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: production
    steps:
      - name: Rollback to previous stable image
        run: |
          echo "Rolling back production to previous stable release"
          # ssh ${{ secrets.PROD_HOST }} "docker pull ghcr.io/${{ github.repository }}:stable-prev && docker-compose up -d"
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
